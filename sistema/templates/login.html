<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login · Grupo Mono</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:#0a0c11;
  background-image:
    radial-gradient(ellipse at 15% 50%, rgba(61,143,96,.07) 0%, transparent 60%),
    radial-gradient(ellipse at 85% 20%, rgba(62,207,142,.04) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 90%, rgba(91,141,238,.04) 0%, transparent 50%);
  font-family:'DM Sans',sans-serif;
  padding:20px;
}
/* ── Wrapper dois painéis ── */
.login-wrapper{width:100%;max-width:860px;display:flex;gap:0;border-radius:22px;overflow:hidden;
  box-shadow:0 48px 100px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.04)}
/* ── Painel de seleção ── */
.panel-select{
  width:52%;background:rgba(15,18,26,.98);border-right:1px solid rgba(255,255,255,.06);
  display:flex;flex-direction:column;padding:44px 38px;position:relative;overflow:hidden
}
.panel-select::before{
  content:'';position:absolute;top:-60px;left:-60px;width:240px;height:240px;
  background:radial-gradient(circle,rgba(61,143,96,.12) 0%,transparent 70%);pointer-events:none
}
.brand{text-align:center;margin-bottom:36px}
.brand-icon{
  width:54px;height:54px;border-radius:15px;
  background:linear-gradient(135deg,#3d8f60,#2d6b47);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 14px;font-size:24px;color:#fff;
  box-shadow:0 8px 24px rgba(61,143,96,.3)
}
.brand h1{font-family:'Playfair Display',serif;font-size:20px;color:#e8eaf0;letter-spacing:.2px}
.brand p{font-size:10px;color:#7a8099;letter-spacing:2px;text-transform:uppercase;margin-top:5px}
.system-btns{display:flex;flex-direction:column;gap:12px;flex:1;justify-content:center}
.sys-btn{
  display:flex;align-items:center;gap:14px;padding:16px 20px;border-radius:14px;
  border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);
  cursor:pointer;transition:all .25s;text-align:left;width:100%
}
.sys-btn:hover{border-color:rgba(61,143,96,.4);background:rgba(61,143,96,.07);transform:translateY(-1px)}
.sys-btn.active{border-color:#3d8f60;background:rgba(61,143,96,.12)}
.sys-btn.active-bt{border-color:#5b8dee;background:rgba(91,141,238,.1)}
.sys-icon{
  width:42px;height:42px;border-radius:11px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff
}
.sys-icon.dre{background:linear-gradient(135deg,#3d8f60,#2d6b47)}
.sys-icon.bt{background:linear-gradient(135deg,#5b8dee,#3a5fb0)}
.sys-label{flex:1}
.sys-label strong{display:block;font-size:13px;font-weight:700;color:#e8eaf0}
.sys-label span{display:block;font-size:10px;color:#7a8099;margin-top:2px}
.sys-arrow{color:#7a8099;font-size:14px;transition:transform .2s}
.sys-btn:hover .sys-arrow,.sys-btn.active .sys-arrow,.sys-btn.active-bt .sys-arrow{transform:translateX(3px);color:#3d8f60}
.sys-btn.active-bt:hover .sys-arrow,.sys-btn.active-bt .sys-arrow{color:#5b8dee}
/* ── Painel do formulário ── */
.panel-form{
  width:48%;background:rgba(20,23,33,.97);
  display:flex;flex-direction:column;justify-content:center;padding:44px 38px;
}
.form-header{margin-bottom:28px}
.form-header h2{font-family:'Playfair Display',serif;font-size:18px;color:#e8eaf0}
.form-header p{font-size:11px;color:#7a8099;margin-top:5px}
.form-group{margin-bottom:16px}
label{display:block;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  color:#7a8099;font-weight:600;margin-bottom:6px}
input[type=text],input[type=password]{
  width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:10px;padding:11px 14px;color:#e8eaf0;font-size:14px;font-family:'DM Sans',sans-serif;
  transition:all .25s;outline:none;
}
input:focus{border-color:#3d8f60;box-shadow:0 0 0 3px rgba(61,143,96,.12)}
input.bt-focus:focus{border-color:#5b8dee;box-shadow:0 0 0 3px rgba(91,141,238,.12)}
.erro{
  background:rgba(255,102,102,.1);border:1px solid rgba(255,102,102,.3);
  border-radius:8px;padding:10px 14px;color:#f99;font-size:13px;margin-bottom:18px;
  display:flex;align-items:center;gap:8px;
}
.btn-login{
  width:100%;border:none;border-radius:10px;padding:13px;color:#0a0c11;
  font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;
  cursor:pointer;transition:all .2s;letter-spacing:.5px;margin-top:6px;
  background:linear-gradient(135deg,#3d8f60,#2d6b47);
}
.btn-login:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 8px 20px rgba(61,143,96,.3)}
.btn-login:active{transform:translateY(0)}
.btn-login.bt-btn{background:linear-gradient(135deg,#5b8dee,#3a5fb0)}
.btn-login.bt-btn:hover{box-shadow:0 8px 20px rgba(91,141,238,.3)}
.system-indicator{
  display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;
  font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  margin-bottom:14px;
}
.system-indicator.dre-ind{background:rgba(61,143,96,.15);color:#3d8f60;border:1px solid rgba(61,143,96,.25)}
.system-indicator.bt-ind{background:rgba(91,141,238,.15);color:#5b8dee;border:1px solid rgba(91,141,238,.25)}
.footer-note{text-align:center;margin-top:20px;font-size:10px;color:#2a2d3a;letter-spacing:.5px}
@keyframes fadeIn{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:translateX(0)}}
.panel-form{animation:fadeIn .3s ease-out}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.login-wrapper{animation:fadeUp .45s ease-out}
/* Mobile */
@media(max-width:640px){
  .login-wrapper{flex-direction:column;max-width:400px}
  .panel-select{width:100%;padding:28px 24px}
  .panel-form{width:100%;padding:28px 24px}
  .system-btns{flex-direction:row;gap:8px;justify-content:stretch}
  .sys-btn{flex-direction:column;align-items:center;text-align:center;padding:14px 10px}
  .sys-label strong{font-size:12px}
  .sys-arrow{display:none}
}
</style>
</head>
<body>

<div class="login-wrapper">
  <!-- PAINEL ESQUERDO: seleção do sistema -->
  <div class="panel-select">
    <div class="brand">
      <div class="brand-icon"><i class="bi bi-grid-3x3-gap-fill"></i></div>
      <h1>Grupo Mono</h1>
      <p>Sistemas de Gestão</p>
    </div>

    <div class="system-btns">
      <button type="button" class="sys-btn {% if sistema != 'talentos' %}active{% endif %}" onclick="selecionarSistema('dre')" id="btnDre">
        <div class="sys-icon dre"><i class="bi bi-bar-chart-line-fill"></i></div>
        <div class="sys-label">
          <strong>Sistema DRE</strong>
          <span>Gestão financeira e resultados</span>
        </div>
        <i class="bi bi-arrow-right sys-arrow"></i>
      </button>

      <button type="button" class="sys-btn {% if sistema == 'talentos' %}active-bt{% endif %}" onclick="selecionarSistema('talentos')" id="btnBt">
        <div class="sys-icon bt"><i class="bi bi-person-badge-fill"></i></div>
        <div class="sys-label">
          <strong>Banco de Talentos</strong>
          <span>Gestão de candidatos</span>
        </div>
        <i class="bi bi-arrow-right sys-arrow"></i>
      </button>
    </div>
  </div>

  <!-- PAINEL DIREITO: formulário de login -->
  <div class="panel-form" id="panelForm">
    {% if erro %}
    <div class="erro"><i class="bi bi-exclamation-triangle"></i> {{ erro }}</div>
    {% endif %}

    <div id="formDre" {% if sistema == 'talentos' %}style="display:none"{% endif %}>
      <div class="form-header">
        <div class="system-indicator dre-ind"><i class="bi bi-bar-chart-line-fill"></i> DRE</div>
        <h2>Acessar Sistema DRE</h2>
        <p>Demonstração de Resultado do Exercício</p>
      </div>
      <form method="post" autocomplete="off">
        <input type="hidden" name="sistema" value="dre">
        <div class="form-group">
          <label for="login_dre">Usuário</label>
          <input type="text" id="login_dre" name="login" placeholder="Digite seu login"
                 {% if sistema != 'talentos' %}autofocus{% endif %} required>
        </div>
        <div class="form-group">
          <label for="senha_dre">Senha</label>
          <input type="password" id="senha_dre" name="senha" placeholder="Digite sua senha" required>
        </div>
        <button type="submit" class="btn-login">Entrar no DRE <i class="bi bi-arrow-right"></i></button>
      </form>
    </div>

    <div id="formBt" {% if sistema != 'talentos' %}style="display:none"{% endif %}>
      <div class="form-header">
        <div class="system-indicator bt-ind"><i class="bi bi-person-badge-fill"></i> Talentos</div>
        <h2>Acessar Banco de Talentos</h2>
        <p>Gestão de candidatos e recrutamento</p>
      </div>
      <form method="post" autocomplete="off">
        <input type="hidden" name="sistema" value="talentos">
        <div class="form-group">
          <label for="login_bt">Usuário</label>
          <input type="text" id="login_bt" name="login" placeholder="Digite seu login"
                 class="bt-focus" {% if sistema == 'talentos' %}autofocus{% endif %} required>
        </div>
        <div class="form-group">
          <label for="senha_bt">Senha</label>
          <input type="password" id="senha_bt" name="senha" placeholder="Digite sua senha"
                 class="bt-focus" required>
        </div>
        <button type="submit" class="btn-login bt-btn">Entrar no Banco de Talentos <i class="bi bi-arrow-right"></i></button>
      </form>
    </div>

    <div class="footer-note">Desenvolvido por Evelyn Cristina · Grupo Mono</div>
  </div>
</div>

<script>
function selecionarSistema(s){
  var isDRE = s === 'dre';
  document.getElementById('btnDre').className = 'sys-btn' + (isDRE ? ' active' : '');
  document.getElementById('btnBt').className = 'sys-btn' + (!isDRE ? ' active-bt' : '');
  document.getElementById('formDre').style.display = isDRE ? '' : 'none';
  document.getElementById('formBt').style.display = isDRE ? 'none' : '';
  var focus = isDRE ? document.getElementById('login_dre') : document.getElementById('login_bt');
  if(focus) setTimeout(function(){ focus.focus(); }, 50);
}
</script>
</body>
</html>
