<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login · Grupo Mono</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:#0a0c11;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(61,143,96,.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(62,207,142,.05) 0%, transparent 50%);
  font-family:'DM Sans',sans-serif;padding:20px;
}
.login-wrap{width:100%;max-width:400px}
.login-card{
  background:rgba(20,23,33,.97);border:1px solid rgba(61,143,96,.18);
  border-radius:20px;padding:44px 38px;
  box-shadow:0 40px 80px rgba(0,0,0,.55),0 0 0 1px rgba(61,143,96,.05);
}
.brand{text-align:center;margin-bottom:36px}
.brand-icon{
  width:54px;height:54px;border-radius:15px;
  background:linear-gradient(135deg,#3d8f60,#2d6b47);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 14px;font-size:24px;color:#fff;
  box-shadow:0 8px 24px rgba(61,143,96,.28)
}
.brand h1{font-family:'Playfair Display',serif;font-size:21px;color:#e8eaf0;letter-spacing:.2px}
.brand p{font-size:10px;color:#7a8099;letter-spacing:2px;text-transform:uppercase;margin-top:5px}
.form-group{margin-bottom:16px}
label{display:block;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  color:#7a8099;font-weight:600;margin-bottom:6px}
input[type=text],input[type=password]{
  width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:10px;padding:12px 14px;color:#e8eaf0;font-size:14px;font-family:'DM Sans',sans-serif;
  transition:all .25s;outline:none;
}
input:focus{border-color:#3d8f60;box-shadow:0 0 0 3px rgba(61,143,96,.12)}
.erro{
  background:rgba(255,102,102,.1);border:1px solid rgba(255,102,102,.3);
  border-radius:8px;padding:10px 14px;color:#f99;font-size:13px;margin-bottom:20px;
  display:flex;align-items:center;gap:8px;
}
.btn-login{
  width:100%;background:linear-gradient(135deg,#3d8f60,#2d6b47);
  border:none;border-radius:10px;padding:13px;color:#fff;
  font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;
  cursor:pointer;transition:all .2s;letter-spacing:.5px;margin-top:8px;
}
.btn-login:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 8px 22px rgba(61,143,96,.35)}
.btn-login:active{transform:translateY(0)}
.footer-note{text-align:center;margin-top:22px;font-size:10px;color:#2e3148;letter-spacing:.5px}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.login-card{animation:fadeIn .45s ease-out}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon"><i class="bi bi-grid-3x3-gap-fill"></i></div>
      <h1>Grupo Mono</h1>
      <p>Sistemas de Gestão</p>
    </div>

    {% if erro %}
    <div class="erro"><i class="bi bi-exclamation-triangle"></i> {{ erro }}</div>
    {% endif %}

    <form method="post" autocomplete="off">
      <div class="form-group">
        <label for="login">Usuário</label>
        <input type="text" id="login" name="login" placeholder="Digite seu login" autofocus required>
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
      </div>
      <button type="submit" class="btn-login">Entrar <i class="bi bi-arrow-right"></i></button>
    </form>

    <div class="footer-note">Desenvolvido por Evelyn Cristina · Grupo Mono</div>
  </div>
</div>
</body>
</html>
