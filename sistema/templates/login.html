<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login · Sistema de DRE</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:#0a0c11;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(200,169,110,.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(62,207,142,.05) 0%, transparent 50%);
  font-family:'DM Sans',sans-serif;
}
.login-wrap{width:100%;max-width:400px;padding:20px}
.login-card{
  background:rgba(26,29,39,.95);border:1px solid rgba(200,169,110,.2);
  border-radius:20px;padding:44px 38px;
  box-shadow:0 40px 80px rgba(0,0,0,.5),0 0 0 1px rgba(200,169,110,.05);
}
.brand{text-align:center;margin-bottom:32px}
.brand-icon{
  width:52px;height:52px;border-radius:14px;
  background:linear-gradient(135deg,#c8a96e,#8b6914);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 12px;font-size:22px;color:#fff;
}
.brand h1{font-family:'Playfair Display',serif;font-size:20px;color:#e8c98e;letter-spacing:.3px}
.brand p{font-size:11px;color:#7a8099;letter-spacing:1.5px;text-transform:uppercase;margin-top:4px}
.form-group{margin-bottom:16px}
label{display:block;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  color:#7a8099;font-weight:600;margin-bottom:6px}
input[type=text],input[type=password]{
  width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:10px;padding:11px 14px;color:#e8eaf0;font-size:14px;font-family:'DM Sans',sans-serif;
  transition:all .25s;outline:none;
}
input:focus{border-color:#c8a96e;box-shadow:0 0 0 3px rgba(200,169,110,.12)}
.erro{
  background:rgba(255,102,102,.1);border:1px solid rgba(255,102,102,.3);
  border-radius:8px;padding:10px 14px;color:#f99;font-size:13px;margin-bottom:18px;
  display:flex;align-items:center;gap:8px;
}
.btn-login{
  width:100%;background:linear-gradient(135deg,#c8a96e,#a8893e);
  border:none;border-radius:10px;padding:13px;color:#0a0c11;
  font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;
  cursor:pointer;transition:all .2s;letter-spacing:.5px;margin-top:6px;
}
.btn-login:hover{background:linear-gradient(135deg,#e8c98e,#c8a96e);transform:translateY(-1px);
  box-shadow:0 8px 20px rgba(200,169,110,.3)}
.btn-login:active{transform:translateY(0)}
.footer-note{text-align:center;margin-top:20px;font-size:10px;color:#3d4155;letter-spacing:.5px}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.login-card{animation:fadeIn .5s ease-out}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon"><i class="bi bi-bar-chart-line-fill"></i></div>
      <h1>Sistema de DRE</h1>
      <p>Gestão Financeira</p>
    </div>

    {% if erro %}
    <div class="erro"><i class="bi bi-exclamation-triangle"></i> {{ erro }}</div>
    {% endif %}

    <form method="post" autocomplete="off">
      <div class="form-group">
        <label for="login">Usuário</label>
        <input type="text" id="login" name="login" placeholder="Digite seu login" autofocus required>
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
      </div>
      <button type="submit" class="btn-login">Entrar <i class="bi bi-arrow-right"></i></button>
    </form>

    <div class="footer-note">Demonstração de Resultado do Exercício · Desenvolvido por: Evelyn Cristina</div>
  </div>
</div>
</body>
</html>
